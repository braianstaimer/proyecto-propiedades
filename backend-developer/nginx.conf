server {
  listen 3001;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docusaurus produce rutas como /intro/index.html
  location / {
    try_files $uri $uri/ $uri.html $uri/index.html /index.html;
  }

  # Asset cache largo
  location ~* \.(?:js|css|svg|woff2?|png|jpg|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  gzip on;
  gzip_types text/plain application/javascript application/json text/css image/svg+xml;
  add_header X-Content-Type-Options "nosniff" always;
}
