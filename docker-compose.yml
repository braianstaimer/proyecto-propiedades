# Orquestador root — levanta mysql + backend + frontend + docs (bonus).
# Variables se leen desde .env (copia de .env.example) con fallback a defaults.
#
# Uso (con .env):
#   cp .env.example .env
#   docker compose up -d --build
#
# Uso sin .env (toma defaults):
#   docker compose up -d --build
#
# Verificar:
#   curl http://localhost:8000/api/health
#   open http://localhost:8080      # UI Vue
#   open http://localhost:3001      # Developer site (Docusaurus + Scalar)
services:
  mysql:
    image: mysql:8.0
    container_name: proyecto-propiedades-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-propiedades_db}
      MYSQL_USER:          ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-apppass}
    volumes:
      - ./backend/persistencia:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    container_name: proyecto-propiedades-backend
    depends_on:
      - mysql
    environment:
      DB_HOST:                 mysql
      DB_PORT:                 "3306"
      DB_USER:                 ${MYSQL_USER:-appuser}
      DB_PASSWORD:             ${MYSQL_PASSWORD:-apppass}
      DB_NAME:                 ${MYSQL_DATABASE:-propiedades_db}
      DB_BACKEND:              mysql
      LLM_BACKEND:             ${LLM_BACKEND:-ollama}
      OLLAMA_URL:              ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL:            ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT_SECONDS:  ${OLLAMA_TIMEOUT_SECONDS:-15}
      MOCK_LLM:                ${MOCK_LLM:-false}
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
      CORS_ORIGINS:            ${CORS_ORIGINS:-["http://localhost:8080","http://localhost:5173"]}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: proyecto-propiedades-frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"

  docs:
    build: ./backend-developer
    container_name: proyecto-propiedades-docs
    ports:
      - "3001:3001"
