<!doctype html>
<html lang="es" data-brand="azul">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto Propiedades · UI kit (web)</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    /* ============================================================
     * UI-kit-only utility shims — reproduce frontend/src/assets/main.css
     * Plus a few editorial polishes flagged in README.md.
     * ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100vh; }
    body {
      margin: 0;
      background: var(--bg-page);
      color: var(--fg-default);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 22px; border-radius: var(--radius-xl);
      background: var(--primary-700); color: #fff; font-weight: 600;
      font-family: var(--font-sans); font-size: var(--fs-body);
      letter-spacing: -0.005em;
      border: 0; cursor: pointer; box-shadow: var(--shadow-card);
      transition: background var(--transition-fast), box-shadow var(--transition-fast), transform 80ms;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-800); box-shadow: var(--shadow-card-hover); }
    .btn-primary:active:not(:disabled) { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 14px; border-radius: var(--radius-lg);
      background: #fff; color: var(--neutral-700);
      border: 1px solid var(--neutral-200); font-weight: 500;
      font-family: var(--font-sans); font-size: var(--fs-caption);
      white-space: nowrap;
      cursor: pointer; transition: background var(--transition-fast), border-color var(--transition-fast);
    }
    .btn-secondary:hover { background: var(--neutral-100); border-color: var(--neutral-300); }

    .input-search {
      width: 100%; padding: 16px 20px;
      border-radius: var(--radius-xl); background: #fff;
      border: 2px solid var(--neutral-200);
      font-family: var(--font-sans); font-size: var(--fs-body); color: var(--fg-default);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: var(--shadow-card);
    }
    .input-search::placeholder { color: var(--neutral-400); }
    .input-search:focus {
      outline: none;
      border-color: var(--primary-500);
      box-shadow: 0 0 0 4px rgba(17, 131, 237, 0.08), var(--shadow-card);
    }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 9999px;
      background: var(--neutral-100); color: var(--neutral-700);
      font-size: var(--fs-caption); line-height: var(--lh-caption); font-weight: 500;
    }

    .card {
      border-radius: var(--radius-xl); background: #fff;
      border: 1px solid var(--neutral-200); overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: box-shadow var(--transition-base), transform var(--transition-base);
    }
    .card:hover { box-shadow: var(--shadow-card-hover); }

    .prop-grid {
      display: grid; gap: var(--kit-grid-gap, 24px);
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) { .prop-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 1024px) { .prop-grid { grid-template-columns: repeat(3, 1fr); } }

    /* Property card hover lift — kit polish */
    .prop-card { will-change: transform; }
    .prop-card:hover { transform: translateY(-3px); }

    /* Tailwind animate-pulse equivalent */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    /* Tailwind animate-spin equivalent */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    /* Focus ring */
    :focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--bg-page), 0 0 0 4px var(--primary-500);
      border-radius: var(--radius-md);
    }

    /* Hero band — kit polish: brand-tinted radial glows + dotted-grid texture */
    .hero-band {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(60% 80% at 50% 0%, rgba(17, 131, 237, 0.07), transparent 60%),
        radial-gradient(50% 50% at 92% 18%, rgba(221, 88, 50, 0.05), transparent 60%),
        radial-gradient(50% 60% at 6% 80%, rgba(8, 102, 203, 0.04), transparent 60%);
      border-bottom: 1px solid var(--neutral-200);
    }
    [data-brand="terracota"] .hero-band {
      background:
        radial-gradient(60% 80% at 50% 0%, rgba(221, 88, 50, 0.08), transparent 60%),
        radial-gradient(50% 50% at 92% 18%, rgba(17, 131, 237, 0.04), transparent 60%),
        radial-gradient(50% 60% at 6% 80%, rgba(221, 88, 50, 0.05), transparent 60%);
    }
    .hero-band::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(15, 58, 110, 0.07) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 75%);
      opacity: 0.65;
      pointer-events: none;
    }
    .hero-band-inner {
      position: relative;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 72px 32px 64px;
    }
    @media (max-width: 640px) {
      .hero-band-inner { padding: 48px 20px 40px; }
    }

    .results-shell {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 36px 32px 96px;
    }

    /* Suggestions section — kit polish, mini-card grid */
    .suggestions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .suggestions__head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
      flex-wrap: wrap;
    }
    .suggestions__label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .suggestions__label::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 1px;
      background: currentColor;
      opacity: 0.5;
    }
    .suggestions__label--primary { color: var(--primary-700); }
    .suggestions__label--accent  { color: var(--accent-700); }
    .suggestions__hint {
      font-size: 12px;
      color: var(--neutral-500);
    }
    .suggestions__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 860px) {
      .suggestions__grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .suggestions__grid { grid-template-columns: 1fr; }
    }

    .suggestion-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--neutral-200);
      cursor: pointer;
      text-align: left;
      font-family: var(--font-sans);
      transition: background var(--transition-fast),
                  border-color var(--transition-fast),
                  transform 140ms,
                  box-shadow var(--transition-fast);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .suggestion-card:hover {
      background: #fff;
      border-color: var(--primary-200);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px -8px rgba(15, 58, 110, 0.18);
    }
    .suggestion-card:active { transform: translateY(0); }
    [data-brand="terracota"] .suggestion-card:hover {
      border-color: var(--accent-200);
    }

    .suggestion-card__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--primary-50);
      color: var(--primary-700);
      flex-shrink: 0;
    }
    [data-brand="terracota"] .suggestion-card__icon {
      background: var(--accent-50);
      color: var(--accent-700);
    }
    .suggestion-card__body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }
    .suggestion-card__hint {
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--neutral-500);
    }
    .suggestion-card__query {
      font-size: 13.5px;
      line-height: 1.35;
      font-weight: 500;
      color: var(--neutral-800);
      letter-spacing: -0.005em;
    }
  </style>
</head>
